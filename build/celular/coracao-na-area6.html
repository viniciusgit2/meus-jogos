<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Coracao na Area 6 - Celular</title>
  <style>
    :root { --bg:#170f24; --panel:#2a1e3f; --text:#fff1f7; --muted:#d9b7ca; --accent:#ff7dad; }
    * { box-sizing: border-box; }
    body { margin:0; background: radial-gradient(circle at top,#3a245c,var(--bg)); color:var(--text); font-family: "Verdana", sans-serif; }
    .app { max-width: 900px; margin: 0 auto; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom); }
    h1 { margin: 8px 0; font-size: clamp(1.3rem, 5.4vw, 2rem); }
    .bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .chip { background: var(--panel); border:1px solid #5b3d80; border-radius:999px; padding:6px 10px; color:var(--muted); }
    canvas { width:100%; background:#110a1c; border:1px solid #5b3d80; border-radius:14px; touch-action:none; }
    .controls { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top:8px; }
    button { min-height:52px; border:0; border-radius:12px; font-weight:700; color:#350019; background:linear-gradient(135deg,var(--accent),#ffc0d8); }
  </style>
</head>
<body>
  <div class="app">
    <h1>Coracao na Area 6</h1>
    <div class="bar">
      <div class="chip" id="score">Pontos: 0</div>
      <div class="chip" id="life">Vidas: 3</div>
      <div class="chip" id="best">Recorde: 0</div>
    </div>
    <canvas id="game" width="420" height="660"></canvas>
    <div class="controls">
      <button id="left">Esquerda</button>
      <button id="start">Reiniciar</button>
      <button id="right">Direita</button>
    </div>
  </div>
  <script>
    const cv = document.getElementById('game');
    const cx = cv.getContext('2d');
    const state = { x: 210, y: 590, speed: 6, hearts: [], danger: [], score: 0, life: 3, best: 0, running: true };

    function spawn() {
      if (Math.random() < 0.045) state.hearts.push({ x: 20 + Math.random() * 380, y: -20, vy: 2 + Math.random() * 2 });
      if (Math.random() < 0.04) state.danger.push({ x: 20 + Math.random() * 380, y: -20, vy: 2.2 + Math.random() * 2.4 });
    }

    function drawHeart(x, y, fill) {
      cx.fillStyle = fill;
      cx.beginPath();
      cx.moveTo(x, y);
      cx.bezierCurveTo(x - 10, y - 12, x - 30, y + 4, x, y + 24);
      cx.bezierCurveTo(x + 30, y + 4, x + 10, y - 12, x, y);
      cx.fill();
    }

    function loop() {
      if (!state.running) return;
      spawn();
      cx.clearRect(0, 0, cv.width, cv.height);
      cx.fillStyle = '#241637';
      cx.fillRect(0, 0, cv.width, cv.height);

      drawHeart(state.x, state.y, '#ff6ca6');

      state.hearts.forEach((h) => h.y += h.vy);
      state.danger.forEach((d) => d.y += d.vy);

      state.hearts = state.hearts.filter((h) => {
        drawHeart(h.x, h.y, '#ffb3d2');
        const hit = Math.hypot(h.x - state.x, h.y - state.y) < 26;
        if (hit) state.score += 10;
        return !hit && h.y < 710;
      });

      state.danger = state.danger.filter((d) => {
        cx.fillStyle = '#8d0000';
        cx.beginPath();
        cx.arc(d.x, d.y, 12, 0, Math.PI * 2);
        cx.fill();
        const hit = Math.hypot(d.x - state.x, d.y - state.y) < 24;
        if (hit) state.life -= 1;
        return !hit && d.y < 710;
      });

      if (state.life <= 0) {
        state.running = false;
        state.best = Math.max(state.best, state.score);
        cx.fillStyle = 'rgba(0,0,0,.55)';
        cx.fillRect(0, 0, cv.width, cv.height);
        cx.fillStyle = '#fff';
        cx.font = 'bold 28px Verdana';
        cx.fillText('Fim de jogo', 120, 300);
      }

      document.getElementById('score').textContent = `Pontos: ${state.score}`;
      document.getElementById('life').textContent = `Vidas: ${state.life}`;
      document.getElementById('best').textContent = `Recorde: ${state.best}`;
      requestAnimationFrame(loop);
    }

    function move(dx) { state.x = Math.max(24, Math.min(cv.width - 24, state.x + dx)); }
    document.getElementById('left').addEventListener('pointerdown', () => move(-36));
    document.getElementById('right').addEventListener('pointerdown', () => move(36));
    cv.addEventListener('pointermove', (e) => {
      if ((e.buttons & 1) === 0) return;
      const r = cv.getBoundingClientRect();
      state.x = Math.max(24, Math.min(cv.width - 24, (e.clientX - r.left) * (cv.width / r.width)));
    });

    document.getElementById('start').addEventListener('click', () => {
      state.hearts = []; state.danger = []; state.life = 3; state.score = 0; state.running = true;
      requestAnimationFrame(loop);
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
