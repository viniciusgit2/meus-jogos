<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Capital Imobiliario 2 - Celular</title>
  <style>
    :root { --bg:#0f1a2b; --panel:#122842; --text:#eff7ff; --muted:#9bb4d3; --accent:#68e6ba; --danger:#ff6a6a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: "Verdana", sans-serif; background: radial-gradient(circle at top,#1a3553,var(--bg)); color:var(--text); }
    .app { max-width: 900px; margin: 0 auto; padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom); }
    h1 { margin: 10px 0; font-size: clamp(1.4rem, 5vw, 2.1rem); }
    .panel { background: var(--panel); border:1px solid #2a4f77; border-radius: 14px; padding: 10px; margin-bottom: 10px; }
    .status { display:flex; flex-wrap:wrap; gap:8px; font-size:.92rem; color:var(--muted); }
    .chip { background:#173557; border:1px solid #2e628f; padding:6px 9px; border-radius:999px; }
    .board { display:grid; grid-template-columns: repeat(5, minmax(58px,1fr)); gap:8px; }
    .cell { background:#18375a; border:1px solid #2e608c; border-radius:11px; min-height:70px; padding:6px; font-size:.8rem; display:grid; align-content:space-between; }
    .owner-p1 { outline:2px solid #66e4b8; }
    .owner-p2 { outline:2px solid #ff8a8a; }
    .controls { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    button { width:100%; min-height:50px; border:0; border-radius:12px; font-weight:700; color:#03201b; background:linear-gradient(130deg,var(--accent),#9cf2e2); }
    button.alt { background:linear-gradient(130deg,#ffc1c1,var(--danger)); color:#2d0202; }
    .log { max-height: 170px; overflow:auto; font-size:.86rem; color:var(--muted); line-height:1.45; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Capital Imobiliario 2</h1>
    <div class="panel status">
      <div class="chip" id="turno"></div>
      <div class="chip" id="p1"></div>
      <div class="chip" id="p2"></div>
      <div class="chip">Toque no botao para jogar</div>
    </div>
    <div class="panel board" id="board"></div>
    <div class="panel controls">
      <button id="roll">Jogar dado</button>
      <button class="alt" id="reset">Reiniciar</button>
    </div>
    <div class="panel log" id="log"></div>
  </div>
  <script>
    const casas = [
      { nome:"Inicio", preco:0, aluguel:0 },
      { nome:"Vila Azul", preco:120, aluguel:24 },
      { nome:"Parque Sul", preco:140, aluguel:28 },
      { nome:"Taxa", preco:0, aluguel:0, tipo:"taxa" },
      { nome:"Centro", preco:180, aluguel:36 },
      { nome:"Chance", preco:0, aluguel:0, tipo:"chance" },
      { nome:"Jardim", preco:220, aluguel:44 },
      { nome:"Orla", preco:250, aluguel:50 },
      { nome:"Praca", preco:270, aluguel:54 },
      { nome:"Bonus", preco:0, aluguel:0, tipo:"bonus" },
      { nome:"Norte", preco:300, aluguel:60 },
      { nome:"Leste", preco:320, aluguel:64 },
      { nome:"Sorte", preco:0, aluguel:0, tipo:"chance" },
      { nome:"Oeste", preco:350, aluguel:70 },
      { nome:"Sul", preco:380, aluguel:76 }
    ];

    let estado;
    const elBoard = document.getElementById('board');
    const elTurno = document.getElementById('turno');
    const elP1 = document.getElementById('p1');
    const elP2 = document.getElementById('p2');
    const elLog = document.getElementById('log');

    function novoEstado() {
      return {
        turno: 0,
        jogadores: [
          { nome:'Jogador 1', dinheiro:1500, pos:0 },
          { nome:'Jogador 2', dinheiro:1500, pos:0 }
        ],
        donos: Array(casas.length).fill(null),
        logs: ['Partida iniciada.']
      };
    }

    function log(msg) {
      estado.logs.unshift(msg);
      estado.logs = estado.logs.slice(0, 16);
      elLog.innerHTML = estado.logs.map((l) => `<div>${l}</div>`).join('');
    }

    function render() {
      elBoard.innerHTML = casas.map((c, i) => {
        const dono = estado.donos[i];
        const p1aqui = estado.jogadores[0].pos === i ? ' J1' : '';
        const p2aqui = estado.jogadores[1].pos === i ? ' J2' : '';
        const cls = dono === 0 ? 'owner-p1' : dono === 1 ? 'owner-p2' : '';
        const linha = c.preco ? `R$${c.preco}` : c.tipo ? c.tipo.toUpperCase() : '';
        return `<div class="cell ${cls}"><strong>${c.nome}</strong><div>${linha}${p1aqui}${p2aqui}</div></div>`;
      }).join('');
      const j = estado.jogadores;
      elTurno.textContent = `Vez: ${j[estado.turno].nome}`;
      elP1.textContent = `J1: R$${j[0].dinheiro}`;
      elP2.textContent = `J2: R$${j[1].dinheiro}`;
    }

    function eventoCasa(jogador, idx) {
      const c = casas[idx];
      if (c.tipo === 'taxa') {
        jogador.dinheiro -= 120;
        log(`${jogador.nome} pagou taxa de R$120.`);
        return;
      }
      if (c.tipo === 'bonus') {
        jogador.dinheiro += 150;
        log(`${jogador.nome} ganhou bonus de R$150.`);
        return;
      }
      if (c.tipo === 'chance') {
        const v = Math.random() < 0.5 ? 130 : -90;
        jogador.dinheiro += v;
        log(`${jogador.nome} caiu na chance: ${v >= 0 ? '+' : ''}${v}.`);
        return;
      }
      if (!c.preco) return;

      const dono = estado.donos[idx];
      if (dono == null) {
        if (jogador.dinheiro >= c.preco) {
          jogador.dinheiro -= c.preco;
          estado.donos[idx] = estado.turno;
          log(`${jogador.nome} comprou ${c.nome} por R$${c.preco}.`);
        }
      } else if (dono !== estado.turno) {
        jogador.dinheiro -= c.aluguel;
        estado.jogadores[dono].dinheiro += c.aluguel;
        log(`${jogador.nome} pagou aluguel de R$${c.aluguel}.`);
      }
    }

    function jogar() {
      const jogador = estado.jogadores[estado.turno];
      const dado = 1 + Math.floor(Math.random() * 6);
      jogador.pos = (jogador.pos + dado) % casas.length;
      if (jogador.pos < dado) {
        jogador.dinheiro += 200;
        log(`${jogador.nome} passou no inicio e ganhou R$200.`);
      }
      log(`${jogador.nome} tirou ${dado} e foi para ${casas[jogador.pos].nome}.`);
      eventoCasa(jogador, jogador.pos);
      if (jogador.dinheiro <= 0) {
        const vencedor = estado.jogadores[(estado.turno + 1) % 2].nome;
        log(`Fim! ${vencedor} venceu.`);
        document.getElementById('roll').disabled = true;
      }
      estado.turno = (estado.turno + 1) % 2;
      render();
    }

    function iniciar() {
      estado = novoEstado();
      document.getElementById('roll').disabled = false;
      render();
      log('Use toque para jogar no celular.');
    }

    document.getElementById('roll').addEventListener('click', jogar);
    document.getElementById('reset').addEventListener('click', iniciar);
    iniciar();
  </script>
</body>
</html>
